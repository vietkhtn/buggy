# Buggy - Test Management for QA Teams
# Docker Compose for local development and self-hosted deployment

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: buggy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: buggy
      POSTGRES_PASSWORD: buggy_password
      POSTGRES_DB: buggy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buggy -d buggy"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Buggy Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buggy-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql://buggy:buggy_password@db:5432/buggy?schema=public"
      AUTH_SECRET: "${AUTH_SECRET:-change-me-in-production}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      AUTH_GOOGLE_ID: "${AUTH_GOOGLE_ID:-}"
      AUTH_GOOGLE_SECRET: "${AUTH_GOOGLE_SECRET:-}"
      AUTH_GITHUB_ID: "${AUTH_GITHUB_ID:-}"
      AUTH_GITHUB_SECRET: "${AUTH_GITHUB_SECRET:-}"
      ENABLE_SESSION_TESTING: "${ENABLE_SESSION_TESTING:-false}"
      ENABLE_RELEASE_TRACKING: "${ENABLE_RELEASE_TRACKING:-false}"
    ports:
      - "3000:3000"

  # Database migrations (one-time setup)
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: buggy-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://buggy:buggy_password@db:5432/buggy?schema=public"
    command: npx prisma db push
    restart: "no"

volumes:
  postgres_data:
