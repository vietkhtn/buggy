# Buggy - Development Docker Compose
# Use this for local development with hot reload

services:
  # PostgreSQL Database only
  db:
    image: postgres:15-alpine
    container_name: buggy-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: buggy
      POSTGRES_PASSWORD: buggy_password
      POSTGRES_DB: buggy
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buggy -d buggy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
